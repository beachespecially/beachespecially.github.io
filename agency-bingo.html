<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentur Buzzword Bingo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Arial", sans-serif;
        background: linear-gradient(
          45deg,
          #1a0033,
          #330066,
          #660099,
          #330066,
          #1a0033
        );
        background-size: 400% 400%;
        animation: gradientShift 15s ease infinite;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      @keyframes gradientShift {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      h1 {
        font-size: 3.5rem;
        text-align: center;
        margin-bottom: 40px;
        color: #fff;
        text-shadow:
          0 0 10px #ff00ff,
          0 0 20px #ff00ff,
          0 0 30px #ff00ff,
          0 0 40px #ff00de,
          0 0 70px #ff00de,
          0 0 80px #ff00de;
        animation: neonPulse 2s ease-in-out infinite alternate;
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      @keyframes neonPulse {
        from {
          text-shadow:
            0 0 10px #ff00ff,
            0 0 20px #ff00ff,
            0 0 30px #ff00ff,
            0 0 40px #ff00de,
            0 0 70px #ff00de,
            0 0 80px #ff00de;
        }
        to {
          text-shadow:
            0 0 5px #ff00ff,
            0 0 10px #ff00ff,
            0 0 15px #ff00ff,
            0 0 20px #ff00de,
            0 0 35px #ff00de,
            0 0 40px #ff00de;
        }
      }

      .bingo-container {
        max-width: 800px;
        width: 100%;
      }

      .bingo-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 12px;
        padding: 20px;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 15px;
        box-shadow:
          0 0 20px rgba(255, 0, 255, 0.5),
          0 0 40px rgba(0, 255, 255, 0.3),
          inset 0 0 20px rgba(255, 0, 255, 0.1);
      }

      .bingo-cell {
        aspect-ratio: 1;
        background: linear-gradient(135deg,#d91175, #ff007e, #b2e040);
        border: 3px solid #00ffff;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        padding: 10px;
        text-align: center;
        font-weight: bold;
        font-size: 0.9rem;
        color: #fff;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .bingo-cell::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          45deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        transform: rotate(45deg);
        animation: shine 3s 1;
      }

      @keyframes shine {
        0% {
          transform: translateX(-100%) translateY(-100%) rotate(45deg);
        }
        100% {
          transform: translateX(100%) translateY(100%) rotate(45deg);
        }
      }

      .bingo-cell:hover {
        transform: scale(1.05) rotate(2deg);
        box-shadow:
          0 0 20px #00ffff,
          0 0 40px #ff00ff,
          inset 0 0 20px rgba(255, 255, 255, 0.2);
        border-color: #ff00ff;
      }

      .bingo-cell:active {
        transform: scale(0.95);
      }

      .bingo-cell.marked {
        background: linear-gradient(135deg, #00ff00, #00ff88);
        border-color: #00ff00;
        animation: markCell 0.5s ease;
        position: relative;
      }

      .bingo-cell.marked::after {
        content: "✓";
        position: absolute;
        font-size: 4rem;
        color: #fff;
        text-shadow:
          0 0 10px #00ff00,
          2px 2px 8px rgba(0, 0, 0, 0.8);
        animation: checkMark 0.5s ease;
      }

      @keyframes markCell {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2) rotate(10deg);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes checkMark {
        0% {
          transform: scale(0) rotate(-180deg);
          opacity: 0;
        }
        50% {
          transform: scale(1.3) rotate(10deg);
        }
        100% {
          transform: scale(1) rotate(0deg);
          opacity: 1;
        }
      }

      .bingo-cell.center {
        background: linear-gradient(135deg, #ffd700, #ffed4e);
        border-color: #ffd700;
        font-size: 1.1rem;
      }

      .celebration-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        animation: fadeIn 0.5s ease;
      }

      .celebration-overlay.active {
        display: flex;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .bingo-message {
        font-size: 8rem;
        font-weight: bold;
        color: #fff;
        text-shadow:
          0 0 20px #ff00ff,
          0 0 40px #ff00ff,
          0 0 60px #ff00ff,
          0 0 80px #ff00de,
          0 0 100px #ff00de,
          0 0 120px #ff00de;
        animation:
          bingoAppear 1s ease,
          bingoPulse 1.5s ease-in-out infinite;
        text-transform: uppercase;
        letter-spacing: 20px;
        z-index: 1001;
      }

      @keyframes bingoAppear {
        0% {
          transform: scale(0) rotate(-180deg);
          opacity: 0;
        }
        50% {
          transform: scale(1.3) rotate(10deg);
        }
        100% {
          transform: scale(1) rotate(0deg);
          opacity: 1;
        }
      }

      @keyframes bingoPulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }

      .confetti {
        position: fixed;
        width: 10px;
        height: 10px;
        z-index: 1000;
        pointer-events: none;
      }

      @keyframes confettiFall {
        to {
          transform: translateY(100vh) rotate(360deg);
          opacity: 0;
        }
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 2rem;
        }

        .bingo-cell {
          font-size: 0.7rem;
          padding: 5px;
        }

        .bingo-grid {
          gap: 8px;
          padding: 15px;
        }

        .bingo-message {
          font-size: 4rem;
          letter-spacing: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="celebration-overlay" id="celebrationOverlay">
      <div class="bingo-message">BINGO!</div>
    </div>

    <div class="bingo-container">
      <h1>Agentur Buzzword Bingo</h1>
      <div class="bingo-grid" id="bingoGrid">
        <!-- Bingo cells will be generated here -->
      </div>
    </div>

    <script>
      const buzzwords = [
        "das bekomme ich verargumentiert",
        "[..]technischer Natur[..]",
        "aufgleisen",
        "aufschlauen",
        "im Nachgang",
        "einen Text kondensieren",
        "Detailgrad",
        "Feingranular",
        "auf der Tonspur",
        "Durchsichten",
        "Sinnstiftend",
        "im Endeffekt",
        "Schlussendlich",
        "Eine andere Denke",
        "aufplanen",
        "bilateral abstimmen",
        "gehirnt",
        "wenn man sich ehrlich macht",
        "es hat eine hohe Wichtigkeit",
        "Da gehe ich d'accord",
        "verschriftlichen",
        "etwas politisieren",
        "nebulös",
        "rausfluppen",
        "eskalativ",
        "reinzecken",
        "im luftleere Raum",
        "Eine Durchsprache benötigen",
        "etwas aufs tableau schreiben",
        "verzielt (Ich bin ja auch hart verzielt, ich muss gewisse Sachen schaffen.)",
        "den Lösungsraum öffnen",
        "technisch gesehen in der Theorie [ist das und das] relevant",
        "Mehrgleisigkeit",
        "Konsultarisch",
        "Showstopper",
        "Overrules",
        "Low hanging fruits",
        "Klarifizieren",
        "Druck draufhalten",
        "durchtackern",
        "reinflocken",
        "anPOCen",
        "Wir deichseln das schon",
        "Lizenz draufgeknallt",
      ];

      const grid = document.getElementById("bingoGrid");

      // Shuffle and select random buzzwords
      function getRandomBuzzwords() {
        // Shuffle the array
        const shuffled = [...buzzwords].sort(() => Math.random() - 0.5);
        // Take first 24 buzzwords
        const selected = shuffled.slice(0, 24);
        // Insert FREE SPACE at position 12 (center of 5x5 grid)
        selected.splice(12, 0, "FREE SPACE");
        return selected;
      }

      const selectedBuzzwords = getRandomBuzzwords();

      // Create bingo cells
      selectedBuzzwords.forEach((buzzword, index) => {
        const cell = document.createElement("div");
        cell.className = "bingo-cell";
        cell.textContent = buzzword;

        // Mark center cell (index 12) as special
        if (index === 12) {
          cell.classList.add("center", "marked");
        }

        // Add click handler
        cell.addEventListener("click", function () {
          if (index !== 12) {
            // Don't toggle the free space
            this.classList.toggle("marked");
            checkBingo();
          }
        });

        grid.appendChild(cell);
      });

      // Check for bingo (5 in a row - horizontal, vertical, or diagonal)
      function checkBingo() {
        const cells = document.querySelectorAll(".bingo-cell");
        const marked = Array.from(cells).map((cell) =>
          cell.classList.contains("marked"),
        );

        // Check rows
        for (let i = 0; i < 5; i++) {
          if (marked.slice(i * 5, i * 5 + 5).every((m) => m)) {
            celebrateBingo();
            return;
          }
        }

        // Check columns
        for (let i = 0; i < 5; i++) {
          if ([0, 1, 2, 3, 4].every((row) => marked[row * 5 + i])) {
            celebrateBingo();
            return;
          }
        }

        // Check diagonals
        if ([0, 6, 12, 18, 24].every((i) => marked[i])) {
          celebrateBingo();
          return;
        }

        if ([4, 8, 12, 16, 20].every((i) => marked[i])) {
          celebrateBingo();
          return;
        }
      }

      function celebrateBingo() {
        // Show celebration overlay
        const overlay = document.getElementById("celebrationOverlay");
        overlay.classList.add("active");

        // Create confetti
        createConfetti();

        // Close overlay on click
        overlay.addEventListener(
          "click",
          function () {
            this.classList.remove("active");
          },
          { once: true },
        );
      }

      function createConfetti() {
        const colors = [
          "#ff00ff",
          "#00ffff",
          "#ff0080",
          "#ffed4e",
          "#00ff00",
          "#ff8c00",
        ];
        const confettiCount = 150;

        for (let i = 0; i < confettiCount; i++) {
          setTimeout(() => {
            const confetti = document.createElement("div");
            confetti.className = "confetti";

            const color = colors[Math.floor(Math.random() * colors.length)];
            const left = Math.random() * 100;
            const animationDuration = 2 + Math.random() * 3;
            const size = 5 + Math.random() * 10;
            const delay = Math.random() * 0.5;

            confetti.style.left = left + "%";
            confetti.style.top = "-10px";
            confetti.style.backgroundColor = color;
            confetti.style.width = size + "px";
            confetti.style.height = size + "px";
            confetti.style.animation = `confettiFall ${animationDuration}s linear ${delay}s forwards`;
            confetti.style.boxShadow = `0 0 10px ${color}`;

            document.body.appendChild(confetti);

            // Remove confetti after animation
            setTimeout(
              () => {
                confetti.remove();
              },
              (animationDuration + delay) * 1000,
            );
          }, i * 10);
        }
      }
    </script>
  </body>
</html>
