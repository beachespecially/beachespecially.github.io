<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentur Buzzword Bingo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Arial", sans-serif;
        background: #000;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
      }

      /* Animated grid background */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: 
          linear-gradient(0deg, transparent 24%, rgba(255, 0, 255, 0.3) 25%, rgba(255, 0, 255, 0.3) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, 0.3) 75%, rgba(0, 255, 255, 0.3) 76%, transparent 77%, transparent),
          linear-gradient(90deg, transparent 24%, rgba(255, 0, 255, 0.3) 25%, rgba(255, 0, 255, 0.3) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, 0.3) 75%, rgba(0, 255, 255, 0.3) 76%, transparent 77%, transparent);
        background-size: 50px 50px;
        animation: gridScroll 20s linear infinite;
        z-index: -1;
      }

      @keyframes gridScroll {
        0% {
          transform: perspective(500px) rotateX(60deg) translateY(0);
        }
        100% {
          transform: perspective(500px) rotateX(60deg) translateY(50px);
        }
      }

      /* Animated rainbow gradient */
      body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          45deg,
          rgba(255, 0, 255, 0.3),
          rgba(0, 255, 255, 0.3),
          rgba(255, 255, 0, 0.3),
          rgba(255, 0, 128, 0.3),
          rgba(0, 255, 255, 0.3),
          rgba(255, 0, 255, 0.3)
        );
        background-size: 400% 400%;
        animation: gradientShift 8s ease infinite;
        z-index: -1;
      }

      @keyframes gradientShift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
      }

      /* Laser beams */
      .laser {
        position: fixed;
        height: 3px;
        background: linear-gradient(90deg, transparent, #ff00ff, transparent);
        box-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
        z-index: -1;
        pointer-events: none;
      }

      .laser-vertical {
        position: fixed;
        width: 3px;
        background: linear-gradient(180deg, transparent, #00ffff, transparent);
        box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
        z-index: -1;
        pointer-events: none;
      }

      @keyframes laserSweepH {
        0% { top: -10%; width: 0%; }
        50% { width: 120%; }
        100% { top: 110%; width: 0%; }
      }

      @keyframes laserSweepV {
        0% { left: -10%; height: 0%; }
        50% { height: 120%; }
        100% { left: 110%; height: 0%; }
      }

      /* Flying sharks with laser eyes */
      .shark {
        position: fixed;
        width: 200px;
        height: 80px;
        z-index: -1;
        pointer-events: none;
        filter: drop-shadow(0 0 20px #00ffff);
      }

      @keyframes sharkFly {
        0% {
          left: -250px;
          transform: scaleX(1) translateY(0px);
        }
        48% {
          transform: scaleX(1) translateY(-30px);
        }
        50% {
          left: 50%;
          transform: scaleX(-1) translateY(-30px);
        }
        98% {
          transform: scaleX(-1) translateY(30px);
        }
        100% {
          left: calc(100% + 250px);
          transform: scaleX(-1) translateY(0px);
        }
      }

      /* Shark laser eyes */
      .shark-laser {
        position: fixed;
        height: 2px;
        background: linear-gradient(90deg, #ff0000, #ff00ff, transparent);
        box-shadow: 0 0 15px #ff0000;
        z-index: -1;
        pointer-events: none;
      }

      @keyframes sharkLaserShoot {
        0% { width: 0%; opacity: 1; }
        50% { width: 300px; opacity: 1; }
        100% { width: 300px; opacity: 0; }
      }

      /* Floating neon stars */
      .neon-star {
        position: fixed;
        font-size: 30px;
        z-index: -1;
        pointer-events: none;
        animation: starFloat 6s ease-in-out infinite;
        text-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
      }

      @keyframes starFloat {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-30px) rotate(180deg); }
      }

      /* Spinning triangles */
      .neon-triangle {
        position: fixed;
        width: 0;
        height: 0;
        border-left: 30px solid transparent;
        border-right: 30px solid transparent;
        border-bottom: 50px solid;
        z-index: -1;
        pointer-events: none;
        animation: triangleSpin 4s linear infinite;
        filter: drop-shadow(0 0 15px currentColor);
      }

      @keyframes triangleSpin {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.5); }
        100% { transform: rotate(360deg) scale(1); }
      }

      /* Pulsating neon circles */
      .neon-circle {
        position: fixed;
        border-radius: 50%;
        border: 3px solid;
        z-index: -1;
        pointer-events: none;
        animation: circlePulse 3s ease-in-out infinite;
      }

      @keyframes circlePulse {
        0%, 100% {
          transform: scale(1);
          opacity: 0.6;
        }
        50% {
          transform: scale(1.5);
          opacity: 0.2;
        }
      }

      /* Scan lines for extra retro effect */
      .scan-line {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background: repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.15),
          rgba(0, 0, 0, 0.15) 1px,
          transparent 1px,
          transparent 2px
        );
        z-index: 5;
        pointer-events: none;
        animation: scanLineGlitch 0.1s infinite;
      }

      @keyframes scanLineGlitch {
        0% { opacity: 0.05; }
        50% { opacity: 0.1; }
        100% { opacity: 0.05; }
      }

      /* Lightning bolts */
      .lightning {
        position: fixed;
        width: 4px;
        height: 40%;
        background: linear-gradient(180deg, #ffff00, #ff00ff, transparent);
        box-shadow: 0 0 20px #ffff00;
        z-index: -1;
        pointer-events: none;
        opacity: 0;
      }

      @keyframes lightningStrike {
        0%, 100% { opacity: 0; }
        10%, 30%, 50% { opacity: 1; }
        20%, 40% { opacity: 0.3; }
      }

      h1 {
        font-size: 3.5rem;
        text-align: center;
        margin-bottom: 40px;
        color: #fff;
        text-shadow:
          0 0 10px #ff00ff,
          0 0 20px #ff00ff,
          0 0 30px #ff00ff,
          0 0 40px #ff00de,
          0 0 70px #ff00de,
          0 0 80px #ff00de;
        animation: neonPulse 2s ease-in-out infinite alternate;
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      @keyframes neonPulse {
        from {
          text-shadow:
            0 0 10px #ff00ff,
            0 0 20px #ff00ff,
            0 0 30px #ff00ff,
            0 0 40px #ff00de,
            0 0 70px #ff00de,
            0 0 80px #ff00de;
        }
        to {
          text-shadow:
            0 0 5px #ff00ff,
            0 0 10px #ff00ff,
            0 0 15px #ff00ff,
            0 0 20px #ff00de,
            0 0 35px #ff00de,
            0 0 40px #ff00de;
        }
      }

      .bingo-container {
        max-width: 800px;
        width: 100%;
        position: relative;
        z-index: 10;
      }

      .bingo-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 12px;
        padding: 20px;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 15px;
        box-shadow:
          0 0 20px rgba(255, 0, 255, 0.5),
          0 0 40px rgba(0, 255, 255, 0.3),
          inset 0 0 20px rgba(255, 0, 255, 0.1);
      }

      .bingo-cell {
        aspect-ratio: 1;
        background: linear-gradient(135deg,#d91175, #ff007e, #b2e040);
        border: 3px solid #00ffff;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        padding: 10px;
        text-align: center;
        font-weight: bold;
        font-size: 0.9rem;
        color: #fff;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .bingo-cell::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          45deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        transform: rotate(45deg);
        animation: shine 3s 1;
      }

      @keyframes shine {
        0% {
          transform: translateX(-100%) translateY(-100%) rotate(45deg);
        }
        100% {
          transform: translateX(100%) translateY(100%) rotate(45deg);
        }
      }

      .bingo-cell:hover {
        transform: scale(1.05) rotate(2deg);
        box-shadow:
          0 0 20px #00ffff,
          0 0 40px #ff00ff,
          inset 0 0 20px rgba(255, 255, 255, 0.2);
        border-color: #ff00ff;
      }

      .bingo-cell:active {
        transform: scale(0.95);
      }

      .bingo-cell.marked {
        background: linear-gradient(135deg, #00ff00, #00ff88);
        border-color: #00ff00;
        animation: markCell 0.5s ease;
        position: relative;
      }

      .bingo-cell.marked::after {
        content: "✓";
        position: absolute;
        font-size: 4rem;
        color: #fff;
        text-shadow:
          0 0 10px #00ff00,
          2px 2px 8px rgba(0, 0, 0, 0.8);
        animation: checkMark 0.5s ease;
      }

      @keyframes markCell {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2) rotate(10deg);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes checkMark {
        0% {
          transform: scale(0) rotate(-180deg);
          opacity: 0;
        }
        50% {
          transform: scale(1.3) rotate(10deg);
        }
        100% {
          transform: scale(1) rotate(0deg);
          opacity: 1;
        }
      }

      .bingo-cell.center {
        background: linear-gradient(135deg, #ffd700, #ffed4e);
        border-color: #ffd700;
        font-size: 1.1rem;
      }

      .celebration-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        animation: fadeIn 0.5s ease;
      }

      .celebration-overlay.active {
        display: flex;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .bingo-message {
        font-size: 8rem;
        font-weight: bold;
        color: #fff;
        text-shadow:
          0 0 20px #ff00ff,
          0 0 40px #ff00ff,
          0 0 60px #ff00ff,
          0 0 80px #ff00de,
          0 0 100px #ff00de,
          0 0 120px #ff00de;
        animation:
          bingoAppear 1s ease,
          bingoPulse 1.5s ease-in-out infinite;
        text-transform: uppercase;
        letter-spacing: 20px;
        z-index: 1001;
      }

      @keyframes bingoAppear {
        0% {
          transform: scale(0) rotate(-180deg);
          opacity: 0;
        }
        50% {
          transform: scale(1.3) rotate(10deg);
        }
        100% {
          transform: scale(1) rotate(0deg);
          opacity: 1;
        }
      }

      @keyframes bingoPulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }

      .confetti {
        position: fixed;
        width: 10px;
        height: 10px;
        z-index: 1000;
        pointer-events: none;
      }

      @keyframes confettiFall {
        to {
          transform: translateY(100vh) rotate(360deg);
          opacity: 0;
        }
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 2rem;
        }

        .bingo-cell {
          font-size: 0.7rem;
          padding: 5px;
        }

        .bingo-grid {
          gap: 8px;
          padding: 15px;
        }

        .bingo-message {
          font-size: 4rem;
          letter-spacing: 10px;
        }

        /* Reduce crazy effects on mobile */
        .shark, .neon-star, .neon-triangle, .neon-circle, .lightning {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="celebration-overlay" id="celebrationOverlay">
      <div class="bingo-message">BINGO!</div>
    </div>

    <div class="bingo-container">
      <h1>Agentur Buzzword Bingo</h1>
      <div class="bingo-grid" id="bingoGrid">
        <!-- Bingo cells will be generated here -->
      </div>
    </div>

    <script>
      const buzzwords = [
        "das bekomme ich verargumentiert",
        "[..]technischer Natur[..]",
        "aufgleisen",
        "aufschlauen",
        "im Nachgang",
        "einen Text kondensieren",
        "Detailgrad",
        "Feingranular",
        "auf der Tonspur",
        "Durchsichten",
        "Sinnstiftend",
        "im Endeffekt",
        "Schlussendlich",
        "Eine andere Denke",
        "aufplanen",
        "bilateral abstimmen",
        "gehirnt",
        "wenn man sich ehrlich macht",
        "es hat eine hohe Wichtigkeit",
        "Da gehe ich d'accord",
        "verschriftlichen",
        "etwas politisieren",
        "nebulös",
        "rausfluppen",
        "eskalativ",
        "reinzecken",
        "im luftleere Raum",
        "Eine Durchsprache benötigen",
        "etwas aufs tableau schreiben",
        "verzielt (Ich bin ja auch hart verzielt, ich muss gewisse Sachen schaffen.)",
        "den Lösungsraum öffnen",
        "technisch gesehen in der Theorie [ist das und das] relevant",
        "Mehrgleisigkeit",
        "Konsultarisch",
        "Showstopper",
        "Overrules",
        "Low hanging fruits",
        "Klarifizieren",
        "Druck draufhalten",
        "durchtackern",
        "reinflocken",
        "anPOCen",
        "Wir deichseln das schon",
        "Lizenz draufgeknallt",
      ];

      const grid = document.getElementById("bingoGrid");

      // Shuffle and select random buzzwords
      function getRandomBuzzwords() {
        // Shuffle the array
        const shuffled = [...buzzwords].sort(() => Math.random() - 0.5);
        // Take first 24 buzzwords
        const selected = shuffled.slice(0, 24);
        // Insert FREE SPACE at position 12 (center of 5x5 grid)
        selected.splice(12, 0, "FREE SPACE");
        return selected;
      }

      const selectedBuzzwords = getRandomBuzzwords();

      // Create bingo cells
      selectedBuzzwords.forEach((buzzword, index) => {
        const cell = document.createElement("div");
        cell.className = "bingo-cell";
        cell.textContent = buzzword;

        // Mark center cell (index 12) as special
        if (index === 12) {
          cell.classList.add("center", "marked");
        }

        // Add click handler
        cell.addEventListener("click", function () {
          if (index !== 12) {
            // Don't toggle the free space
            this.classList.toggle("marked");
            checkBingo();
          }
        });

        grid.appendChild(cell);
      });

      // Check for bingo (5 in a row - horizontal, vertical, or diagonal)
      function checkBingo() {
        const cells = document.querySelectorAll(".bingo-cell");
        const marked = Array.from(cells).map((cell) =>
          cell.classList.contains("marked"),
        );

        // Check rows
        for (let i = 0; i < 5; i++) {
          if (marked.slice(i * 5, i * 5 + 5).every((m) => m)) {
            celebrateBingo();
            return;
          }
        }

        // Check columns
        for (let i = 0; i < 5; i++) {
          if ([0, 1, 2, 3, 4].every((row) => marked[row * 5 + i])) {
            celebrateBingo();
            return;
          }
        }

        // Check diagonals
        if ([0, 6, 12, 18, 24].every((i) => marked[i])) {
          celebrateBingo();
          return;
        }

        if ([4, 8, 12, 16, 20].every((i) => marked[i])) {
          celebrateBingo();
          return;
        }
      }

      function celebrateBingo() {
        // Show celebration overlay
        const overlay = document.getElementById("celebrationOverlay");
        overlay.classList.add("active");

        // Create confetti
        createConfetti();

        // Close overlay on click
        overlay.addEventListener(
          "click",
          function () {
            this.classList.remove("active");
          },
          { once: true },
        );
      }

      function createConfetti() {
        const colors = [
          "#ff00ff",
          "#00ffff",
          "#ff0080",
          "#ffed4e",
          "#00ff00",
          "#ff8c00",
        ];
        const confettiCount = 150;

        for (let i = 0; i < confettiCount; i++) {
          setTimeout(() => {
            const confetti = document.createElement("div");
            confetti.className = "confetti";

            const color = colors[Math.floor(Math.random() * colors.length)];
            const left = Math.random() * 100;
            const animationDuration = 2 + Math.random() * 3;
            const size = 5 + Math.random() * 10;
            const delay = Math.random() * 0.5;

            confetti.style.left = left + "%";
            confetti.style.top = "-10px";
            confetti.style.backgroundColor = color;
            confetti.style.width = size + "px";
            confetti.style.height = size + "px";
            confetti.style.animation = `confettiFall ${animationDuration}s linear ${delay}s forwards`;
            confetti.style.boxShadow = `0 0 10px ${color}`;

            document.body.appendChild(confetti);

            // Remove confetti after animation
            setTimeout(
              () => {
                confetti.remove();
              },
              (animationDuration + delay) * 1000,
            );
          }, i * 10);
        }
      }

      // Create crazy 80s background animations
      function createCrazyAnimations() {
        // Create horizontal lasers
        for (let i = 0; i < 3; i++) {
          setTimeout(() => {
            const laser = document.createElement("div");
            laser.className = "laser";
            laser.style.top = Math.random() * 100 + "%";
            laser.style.left = "0";
            laser.style.animation = `laserSweepH ${3 + Math.random() * 2}s ease-in-out infinite`;
            laser.style.animationDelay = Math.random() * 3 + "s";
            document.body.appendChild(laser);
          }, i * 1000);
        }

        // Create vertical lasers
        for (let i = 0; i < 3; i++) {
          setTimeout(() => {
            const laser = document.createElement("div");
            laser.className = "laser-vertical";
            laser.style.left = Math.random() * 100 + "%";
            laser.style.top = "0";
            laser.style.animation = `laserSweepV ${3 + Math.random() * 2}s ease-in-out infinite`;
            laser.style.animationDelay = Math.random() * 3 + "s";
            document.body.appendChild(laser);
          }, i * 1000);
        }

        // Create flying sharks with laser eyes
        for (let i = 0; i < 2; i++) {
          setTimeout(() => {
            const shark = document.createElement("div");
            shark.className = "shark";
            const topPos = 20 + Math.random() * 60;
            shark.style.top = topPos + "%";
            
            // Shark SVG with glowing eyes
            shark.innerHTML = `
              <svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <filter id="glow${i}">
                    <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                    <feMerge>
                      <feMergeNode in="coloredBlur"/>
                      <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                  </filter>
                </defs>
                <!-- Shark body -->
                <path d="M180,40 Q150,20 100,25 Q50,30 20,40 Q50,50 100,55 Q150,60 180,40 Z" 
                      fill="#00ffff" stroke="#ff00ff" stroke-width="2"/>
                <!-- Shark fin -->
                <path d="M100,25 L90,5 L95,25 Z" fill="#00ffff" stroke="#ff00ff" stroke-width="2"/>
                <!-- Shark tail -->
                <path d="M180,40 L195,25 L195,55 Z" fill="#00ffff" stroke="#ff00ff" stroke-width="2"/>
                <!-- Laser eyes -->
                <circle cx="40" cy="35" r="4" fill="#ff0000" filter="url(#glow${i})"/>
                <circle cx="40" cy="45" r="4" fill="#ff0000" filter="url(#glow${i})"/>
              </svg>
            `;
            
            shark.style.animation = `sharkFly ${8 + Math.random() * 4}s linear infinite`;
            shark.style.animationDelay = i * 5 + "s";
            document.body.appendChild(shark);

            // Create laser beams from shark eyes
            setInterval(() => {
              if (shark.getBoundingClientRect().left > 0 && shark.getBoundingClientRect().left < window.innerWidth) {
                for (let j = 0; j < 2; j++) {
                  const laserBeam = document.createElement("div");
                  laserBeam.className = "shark-laser";
                  laserBeam.style.top = (topPos + (j === 0 ? -1 : 1)) + "%";
                  
                  const sharkRect = shark.getBoundingClientRect();
                  const isFlipped = shark.style.animation.includes('sharkFly') && 
                                   sharkRect.left > window.innerWidth / 2;
                  
                  if (isFlipped) {
                    laserBeam.style.right = (window.innerWidth - sharkRect.left) + "px";
                    laserBeam.style.transform = "scaleX(-1)";
                  } else {
                    laserBeam.style.left = sharkRect.right + "px";
                  }
                  
                  laserBeam.style.animation = "sharkLaserShoot 0.5s ease-out forwards";
                  document.body.appendChild(laserBeam);

                  setTimeout(() => laserBeam.remove(), 500);
                }
              }
            }, 2000 + Math.random() * 3000);

          }, i * 4000);
        }

        // Create floating neon stars
        const starColors = ["#ff00ff", "#00ffff", "#ffff00", "#ff0080", "#00ff00"];
        for (let i = 0; i < 15; i++) {
          const star = document.createElement("div");
          star.className = "neon-star";
          star.textContent = ["★", "✦", "✧", "✨"][Math.floor(Math.random() * 4)];
          star.style.left = Math.random() * 100 + "%";
          star.style.top = Math.random() * 100 + "%";
          star.style.color = starColors[Math.floor(Math.random() * starColors.length)];
          star.style.animationDelay = Math.random() * 3 + "s";
          star.style.animationDuration = 4 + Math.random() * 4 + "s";
          document.body.appendChild(star);
        }

        // Create spinning neon triangles
        const triangleColors = ["#ff00ff", "#00ffff", "#ff8c00", "#00ff00"];
        for (let i = 0; i < 8; i++) {
          const triangle = document.createElement("div");
          triangle.className = "neon-triangle";
          triangle.style.left = Math.random() * 100 + "%";
          triangle.style.top = Math.random() * 100 + "%";
          triangle.style.borderBottomColor = triangleColors[Math.floor(Math.random() * triangleColors.length)];
          triangle.style.animationDelay = Math.random() * 2 + "s";
          triangle.style.animationDuration = 3 + Math.random() * 3 + "s";
          document.body.appendChild(triangle);
        }

        // Create pulsating neon circles
        const circleColors = ["#ff00ff", "#00ffff", "#ff0080"];
        for (let i = 0; i < 6; i++) {
          const circle = document.createElement("div");
          circle.className = "neon-circle";
          const size = 50 + Math.random() * 150;
          circle.style.width = size + "px";
          circle.style.height = size + "px";
          circle.style.left = Math.random() * 100 + "%";
          circle.style.top = Math.random() * 100 + "%";
          circle.style.borderColor = circleColors[Math.floor(Math.random() * circleColors.length)];
          circle.style.animationDelay = Math.random() * 2 + "s";
          circle.style.animationDuration = 2 + Math.random() * 3 + "s";
          document.body.appendChild(circle);
        }

        // Add scan lines for retro CRT effect
        const scanLine = document.createElement("div");
        scanLine.className = "scan-line";
        document.body.appendChild(scanLine);

        // Create occasional lightning bolts
        setInterval(() => {
          if (Math.random() > 0.7) {
            const lightning = document.createElement("div");
            lightning.className = "lightning";
            lightning.style.left = Math.random() * 100 + "%";
            lightning.style.top = "0";
            lightning.style.animation = "lightningStrike 0.5s ease-out forwards";
            document.body.appendChild(lightning);
            
            setTimeout(() => lightning.remove(), 500);
          }
        }, 2000);
      }

      // Initialize crazy animations on page load
      createCrazyAnimations();
    </script>
  </body>
</html>
